<script type="text/javascript">
  RED.nodes.registerType("OpenAI API", {
    category: "AI",
    color: "#B8B1FB",
    defaults: {
      name: { value: "" },
      property: { value: "payload", required: true },
      propertyType: { value: "msg" },
      service: { value: "", type: "Service Host", required: true },
      method: { value: "", required: true },
    },
    inputs: 1,
    outputs: 1,
    icon: "icon.png",
    label: function () {
      return this.name || this.method || "OpenAI API";
    },
    labelStyle: function () {
      return this.name ? "node_label_italic" : "";
    },
    oneditprepare: function () {
      var selectedMethod = $("#node-input-method option:selected");
      if (!selectedMethod.val()) {
        var methods = $("#node-input-method").children();
        var firstMethod = methods.first();
        $("#node-input-method").val(firstMethod.val());
      };

      // set the default property type value to "payload"
      if (this.property === undefined) {
        $("#node-input-property").val("payload");
      }

      $("#node-input-property").typedInput({
        default: "msg",
        value: "payload",
        types: ["msg", "flow", "global"],
        typeField: "#node-input-propertyType"
      })
    }
  });
</script>

<script type="text/javascript">
  RED.nodes.registerType("Service Host", {
    category: "config",
    defaults: {
      apiBase: { value: "" },
      apiBaseType: { value: "str" },
      secureApiKeyHeaderOrQueryName: { value: "" },
      secureApiKeyHeaderOrQueryNameType: { value: "str" },
      organizationId: { value: "" },
      organizationIdType: { value: "str" },
      name: { value: "" },
    },
    credentials: {
      secureApiKeyValue: { type: "text" },
      secureApiKeyValueType: { type: "text" },
      temp: { type: "text" },
    },
    label: function () {
      return this.name || this.host;
    },
    labelStyle: function () {
      return this.name ? "node_label_italic" : "";
    },
    oneditprepare: function () {
      [
        { input: "#node-config-input-apiBase", type: "#node-config-input-apiBaseType" },
        { input: "#node-config-input-secureApiKeyHeaderOrQueryName", type: "#node-config-input-secureApiKeyHeaderOrQueryNameType" },
        { input: "#node-config-input-organizationId", type: "#node-config-input-organizationIdType" },
        { input: "#node-config-input-secureApiKeyValue", type: "#node-config-input-secureApiKeyValueType" }
      ].forEach(function(field) {
        $(field.input).typedInput({
          default: "str",
          types: ["str", "env", "msg", "flow", "global"],
          typeField: field.type
        });
      });
    },
  });
</script>
